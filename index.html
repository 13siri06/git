<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
        }

        h1 {
            margin: 0;
        }

        .content {
            margin: 40px auto;
            max-width: 600px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        img {
            margin-top: 20px;
            border-radius: 10px;
        }

        footer {
            margin-top: 40px;
            padding: 10px;
            background-color: #2c3e50;
            color: white;
        }
    </style>
</head>

<body>

<header>
    <h1>My Website</h1>
</header>

<div class="content">
    <p>This is a simple website deployed using Jenkins </p>
    <img src="https://picsum.photos/seed/picsum/600/400" alt="Sample Image">
</div>

<footer>
    <p>© 2026 My Website | Built with  using Jenkins</p>
</footer>

</body>
</html>
